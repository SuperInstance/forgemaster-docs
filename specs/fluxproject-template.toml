# FLUX-LUCID Project Template
# Generated by Seed-Mini

# FLUX-LUCID eVTOL Flight Control System TOML Configuration
# Compliant with DO-178C Level A / ISO 26262 ASIL-D aerospace safety standards
# For use with the FLUX formal guard synthesis toolchain

# Core project metadata
[project]
# Human-readable project identifier
name = "FLUX-LUCID-eVTOL-Primary-Flight-Control"
# Semantic versioning for firmware releases
version = "1.2.0-beta"
# Safety integrity level: ASIL-D for primary flight control (highest criticality tier)
safety_level = "ASIL_D"
# Target hardware platform name, aligned with [hardware] silicon target below
target_hardware = "tsmc-22fdx-aerospace-flight-controller-board"

# FLUX guard synthesis and build settings
[guard]
# Directory containing formal safety guard contracts written in FLUX IDL
# Covers rotor speed limits, current thresholds, fault detection, and sensor fusion
source_dir = "./src/flux-guards/"
# Output directory for compiled guard binaries and synthesized hardware modules
output_dir = "./build/flux-compiled-guards/"
# Optimization level: O3 maximizes runtime performance for hard real-time control loops
optimization_level = "O3"

# FLUX runtime and formal verification constraints
[flux]
# Maximum formal verification gas steps (limits bounded model checking depth for complex redundant systems)
gas_limit = 2500000
# Stack size for FLUX runtime: 128KB for deep call stacks in sensor fusion and guard logic
stack_size = 131072
# Maximum total size of synthesized FLUX program: 4MB for full flight control + guard logic
max_program_size = 4194304

# Safety constraint enforcement rules
[safety]
# Constraint priority: enforce hard safety constraints (rotor speed, current limits) first before soft performance rules
constraint_priority = "HARD_FIRST"
# Conflict policy: abort execution immediately if conflicting safety constraints are detected to prevent unsafe operation
conflict_policy = "FAIL_FIRST"
# Maximum allowable thermal dissipation for the FCS with active aerodynamic cooling
thermal_budget_w = 18.0
# Maximum allowed latency for safety guard checks: 500us for 2kHz primary control loop rate
max_latency_us = 500

# Formal verification and certification settings
[verification]
# Formal verification tools used: Coq for inductive safety proofs, Lean4 for bounded model checking
formal_tool = "coq,lean4"
# Proof level: full formal verification of all critical safety paths per DO-178C Level A
proof_level = "full"
# Generate structured certification documentation for FAA/EASA approval
generate_certification_report = true

# Target hardware silicon and peripheral settings
[hardware]
# Target silicon process: TSMC 22nm FDX (aerospace/automotive grade ASIL-D compliant)
target = "22fdx"
# Number of redundant Remote Actuation Units (matches 6-rotor eVTOL lift+cruise configuration)
num_raus = 6
# Bit width of actuation command signals: 16-bit for precise torque/speed control
activation_width = 16
# Non-volatile ROM size: 64MB for firmware, guard binaries, calibration data, and flight logs
rom_size_bytes = 67108864

# Benchmark and reliability targets
[benchmark]
# Maximum safe continuous power draw for the flight controller core, in watts
safe_tops_w_target = 15.0
# Pass rate target for HIL/simulation verification benchmarks, meets ASIL-D reliability requirements
pass_rate_target = 99.999
# Total power budget for full flight control system (includes sensors and communication interfaces)
power_budget_w = 16.0

# Deployment and hardware bring-up settings
[deploy]
# Deployment interfaces: PCIe for high-speed telemetry/software updates, JTAG for in-system debugging
interface = "pcie,jtag"
# Core clock frequency for FLUX processing: 300MHz ensures sub-microsecond safety guard latency
clock_mhz = 300